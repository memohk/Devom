<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DVOM Admin - Login</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8f9fe;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            height: 80px;
            margin-bottom: 20px;
        }

        h1 {
            color: #1976D2;
            font-size: 24px;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #1976D2;
            color: white;
            border: none;
            border-radius: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #1565C0;
        }

        .error {
            color: #E53935;
            font-size: 14px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <img src="/templates/images/logon.png" alt="DVOM Logo" class="logo">
        <h1>Administrative Access</h1>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form action="{{ url_for('admin.admin_login') }}" method="POST">
            <input type="text" name="username" placeholder="Admin Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-login">SIGN IN TO CONSOLE</button>
        </form>
        <p style="color: #BDBDBD; font-size: 12px; margin-top: 20px;">Internal System V3.1.2 | Protected By DVOM</p>
    </div>
</body>

</html>
